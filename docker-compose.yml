services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-alpine
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  migrate:
    build: .
    command: uv run alembic upgrade head
    env_file: .env
    environment:
      DATABASE_DSN: postgresql+asyncpg://postgres:postgres@postgres:5432/app
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      DATABASE_DSN: postgresql+asyncpg://postgres:postgres@postgres:5432/app
      REDIS_DSN: redis://redis:6379/0
      RABBIT_DSN: amqp://guest:guest@rabbitmq/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
